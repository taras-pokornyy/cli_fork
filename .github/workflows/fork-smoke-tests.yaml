name: Fork PR Smoke Tests (Manual Dispatch)

# This workflow allows maintainers to run smoke tests for fork PRs safely.
# Uses workflow_dispatch instead of pull_request_target to avoid secrets leakage.
# A maintainer triggers this manually from the Actions tab, providing the PR number.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to test'
        required: true
        type: number
      commit_sha:
        description: 'Exact commit SHA from the fork PR to test (leave empty to use PR head)'
        required: false
        type: string

jobs:
  resolve-pr:
    runs-on: ubuntu-latest
    name: Resolve PR Details
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      is_fork: ${{ steps.resolve.outputs.is_fork }}
    permissions:
      pull-requests: read
    steps:
      - name: Resolve PR commit SHA
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }}
            });

            const isFork = pr.data.head.repo.full_name !== pr.data.base.repo.full_name;
            core.setOutput('is_fork', isFork.toString());

            const sha = '${{ inputs.commit_sha }}' || pr.data.head.sha;
            console.log(`PR #${{ inputs.pr_number }} — fork: ${isFork}, sha: ${sha}`);
            core.setOutput('sha', sha);

  # Security check before running tests with secrets
  security-scan:
    needs: resolve-pr
    if: needs.resolve-pr.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.sha }}
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec security scanner
        run: |
          gosec -fmt=sarif -out=gosec-results.sarif -exclude-dir=smoke_test_scripts ./... || true

  build-windows:
    needs: [resolve-pr, security-scan]
    uses: ./.github/workflows/.build-windows.yaml
    with:
      go-version: '1.26.1'
      artifact-name: 'dr-windows-fork'
      ref: ${{ needs.resolve-pr.outputs.sha }}
    secrets: inherit

  notify-start:
    needs: [resolve-pr, security-scan]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Notify smoke tests started
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              body: '🔐 **Fork smoke tests started by maintainer**\n\n' +
                    '⏳ Security scans passed. Running smoke tests...\n\n' +
                    `Commit: \`${{ needs.resolve-pr.outputs.sha }}\`\n` +
                    `[View run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
            });

  linux-smoke-tests:
    needs: [resolve-pr, security-scan]
    uses: ./.github/workflows/.smoke-tests-matrix.yaml
    with:
      go-version: '1.26.1'
      ref: ${{ needs.resolve-pr.outputs.sha }}
    secrets: inherit

  windows-smoke-tests:
    needs: [resolve-pr, security-scan, build-windows]
    uses: ./.github/workflows/.windows-smoke-test.yaml
    with:
      artifact-name: 'dr-windows-fork'
      ref: ${{ needs.resolve-pr.outputs.sha }}
    secrets: inherit

  notify-results:
    needs: [resolve-pr, security-scan, notify-start, linux-smoke-tests, windows-smoke-tests]
    if: always() && needs.resolve-pr.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Comment on PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const securityStatus = '${{ needs.security-scan.result }}';
            const linuxStatus = '${{ needs.linux-smoke-tests.result }}';
            const windowsStatus = '${{ needs.windows-smoke-tests.result }}';

            const securityEmoji = securityStatus === 'success' ? '✅' : '❌';
            const linuxEmoji = linuxStatus === 'success' ? '✅' : '❌';
            const windowsEmoji = windowsStatus === 'success' ? '✅' : '❌';

            const allPassed = securityStatus === 'success' && linuxStatus === 'success' && windowsStatus === 'success';
            const overallEmoji = allPassed ? '✅' : '❌';
            const overallMessage = allPassed ? 'All smoke tests passed!' : 'Some smoke tests failed.';

            let failureNote = '';
            if (securityStatus === 'failure') {
              failureNote = '\n\n⚠️ **Security vulnerabilities detected!** Check the Security tab for details.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              body: `${overallEmoji} **${overallMessage}** (Fork PR)\n\n` +
                    `${securityEmoji} Security Scan: ${securityStatus}\n` +
                    `${linuxEmoji} Linux: ${linuxStatus}\n` +
                    `${windowsEmoji} Windows: ${windowsStatus}\n\n` +
                    `[View run details](${context.payload.repository.html_url}/actions/runs/${context.runId})` +
                    failureNote
            });
