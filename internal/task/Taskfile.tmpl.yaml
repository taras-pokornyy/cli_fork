---
# File generated by DataRobot CLI, regenerate using `dr task compose`
version: '3'
env:
  ENV: testing
dotenv: ['.env', '.env.{{ "{{" }}.ENV{{ "}}" }}']
includes:
  {{- range .Includes }}
  {{ .Name }}:
    taskfile: {{ .Taskfile }}
    dir: {{ .Dir }}
  {{- end }}
tasks:
  default:
    desc: "ℹ️ Show all available tasks (run `task --list-all` to see hidden tasks)"
    cmds:
      - task --list --sort none
    silent: true

  start:
    desc: "💻 Prepare local development environment"
    cmds:
      - dr self update
      - dr dotenv setup --if-needed
      - task install
      {{- if .HasStart }}
      {{- range .StartComponents }}
      - task {{ . }}:start
      {{- end }}
      {{- end }}
      - echo '✅ You are all set. Run `task dev` to start developing, or run `task deploy-dev` to deploy to DataRobot.'
  {{- if .HasLint }}

  lint:
    desc: "🧹 Run linters"
    cmds:
      {{- range .LintComponents }}
      - task: {{ . }}:lint
      {{- end }}
  {{- end }}
  {{- if .HasInstall }}

  install:
    desc: "🛠️ Install all dependencies"
    cmds:
      {{- range .InstallComponents }}
      - task: {{ . }}:install
      {{- end }}
  {{- end }}
  {{- if .HasUninstall }}

  uninstall:
    desc: "🛠️ Uninstall all dependencies"
    cmds:
      {{- range .UninstallComponents }}
      - task: {{ . }}:uninstall
      {{- end }}

  reinstall:
    desc: "🛠️ Reinstall all dependencies"
    cmds:
      - task: uninstall
      - task: install
  {{- else }}

  reinstall:
    desc: "🛠️ Reinstall all dependencies (placeholder task)"
  {{- end }}
  {{- if .HasTest }}

  test:
    desc: "🧪 Run tests across all components"
    cmds:
      {{- range .TestComponents }}
      - task: {{ . }}:test
      {{- end }}
  {{- end }}
  {{- if .HasDev }}
  dev:
    desc: "🚀 Run all services together"
    cmds:
      - |
        {{- range $idx, $component := .DevComponents }}
        {{- if eq $idx 0 }}
        task {{ $component }}:dev &
        {{- else }}
        sleep 3
        task {{ $component }}:dev &
        {{- end }}
        {{- end }}
        sleep 8
        echo "✅ All servers started!"
        if [[ -n "$NOTEBOOK_ID" ]]; then
          prefix="${DATAROBOT_API_ENDPOINT//api\/v2/}notebook-sessions/$NOTEBOOK_ID/ports/"
        else
          prefix="http://localhost:"
        fi
        {{- range .DevPorts }}
        echo "🔗 {{ .Name }}: ${prefix}{{ .Port }}"
        {{- end }}
        wait
  {{- end }}

  {{- if .HasDeploy }}
  deploy:
    desc: "🚀 Deploy all services"
    env:
      AGENT_DEPLOY: "1"
    cmds:
      {{- range .DeployComponents }}
      - task: {{ . }}:deploy
      {{- end }}
  {{- end }}

  {{- if .HasDeployDev }}
  deploy-dev:
    desc: "🚀 Deploy infrastructure and services to development"
    cmds:
      {{- range .DeployDevComponents }}
      - task: {{ . }}:deploy-dev
      {{- end }}
  {{- end }}
